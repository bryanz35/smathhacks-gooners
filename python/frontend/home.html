<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOONER ROV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #e0f0ff;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- TOP BAR ---- */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #0d1b2e;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 1rem;
      letter-spacing: 3px;
      color: #4fc3f7;
      text-transform: uppercase;
    }

    #connection-status {
      font-size: 0.75rem;
      color: #aaa;
    }

    #connection-status span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 4px;
      vertical-align: middle;
    }

    #connection-status.online span { background: #00e676; }
    #connection-status.offline span { background: #f44336; }

    /* ---- MAIN LAYOUT ---- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- CAMERA FEEDS ---- */
    #cameras {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 2px;
      background: #000;
    }

    .cam-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .cam-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cam-label {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #4fc3f7;
      background: rgba(0,0,0,0.5);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .cam-offline {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.8rem;
      letter-spacing: 2px;
    }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 220px;
      background: #0d1b2e;
      border-left: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 16px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #4fc3f7;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 1px solid #1e3a5f;
      padding-bottom: 4px;
    }

    /* ---- SENSORS ---- */
    .sensor-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .sensor-label {
      font-size: 0.7rem;
      color: #78909c;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sensor-value {
      font-size: 1rem;
      color: #e0f0ff;
      font-weight: bold;
    }

    .sensor-unit {
      font-size: 0.65rem;
      color: #78909c;
      margin-left: 2px;
    }

    #quality-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-top: 4px;
      background: #1e3a5f;
      color: #4fc3f7;
    }

    #quality-badge.Excellent { background: #003300; color: #00e676; }
    #quality-badge.Good      { background: #1a3300; color: #76ff03; }
    #quality-badge.Fair      { background: #332200; color: #ffab40; }
    #quality-badge.Poor      { background: #330000; color: #ff5252; }
    #quality-badge.Unsafe    { background: #440000; color: #ff1744; }

    /* ---- WASD ---- */
    #wasd {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(2, 40px);
      gap: 4px;
      justify-content: center;
    }

    .key {
      width: 40px;
      height: 40px;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #4fc3f7;
      background: #0a0e1a;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }

    .key.active {
      background: #4fc3f7;
      color: #0a0e1a;
    }

    #key-w { grid-column: 2; grid-row: 1; }
    #key-a { grid-column: 1; grid-row: 2; }
    #key-s { grid-column: 2; grid-row: 2; }
    #key-d { grid-column: 3; grid-row: 2; }

    /* ---- SENSOR LOADING ---- */
    .loading { color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>

  <div id="topbar">
    <h1>GOONER ROV</h1>
    <div id="connection-status">
      <span></span><span id="status-text">connecting...</span>
    </div>
  </div>

  <div id="main">
    <div id="cameras">
      <div class="cam-wrapper">
        <img id="cam1" src="/video_feed1" alt="">
        <div class="cam-label">CAM 1 — FWD</div>
        <div class="cam-offline" id="cam1-offline" style="display:none">NO SIGNAL</div>
      </div>
      <div class="cam-wrapper">
        <img id="cam2" src="/video_feed2" alt="">
        <div class="cam-label">CAM 2 — AFT</div>
        <div class="cam-offline" id="cam2-offline" style="display:none">NO SIGNAL</div>
      </div>
    </div>

    <div id="sidebar">
      <div>
        <div class="panel-title">Sensors</div>
        <div class="sensor-row">
          <span class="sensor-label">TDS</span>
          <span><span class="sensor-value" id="tds">--</span><span class="sensor-unit">ppm</span></span>
        </div>
        <div class="sensor-row">
          <span class="sensor-label">Quality</span>
          <span id="quality-badge">--</span>
        </div>
      </div>

      <div>
        <div class="panel-title">Controls</div>
        <div id="wasd">
          <div class="key" id="key-w">W</div>
          <div class="key" id="key-a">A</div>
          <div class="key" id="key-s">S</div>
          <div class="key" id="key-d">D</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/home.js"></script>
</body>
</html>
